# Crypto backend selected via CONFIG_CANTIL_CRYPTO_BACKEND in Kconfig.
# Default: CANTIL_CRYPTO_BACKEND_FREE (mbedtls direct, GPLv3-compatible).
# The accelerated backend (Oberon + CC3XX) is a placeholder; see Kconfig.

# mbedtls — Zephyr in-tree build, direct API.  Selected by CANTIL_CRYPTO_BACKEND_FREE.
# Zephyr's mbedtls Kconfig uses *_ENABLED suffixes for source-file selection;
# the upstream MBEDTLS_*_C macros for ECDSA/ECP/HKDF/etc. are user-settable.
# CA: ECDSA P-256 (RFC 6979 deterministic), AES-256-GCM, HKDF-SHA256.
# Noise_XX: X25519, ChaCha20-Poly1305, SHA-256.
CONFIG_MBEDTLS_CIPHER_AES_ENABLED=y
CONFIG_MBEDTLS_CIPHER_GCM_ENABLED=y
CONFIG_MBEDTLS_CIPHER_CHACHA20_ENABLED=y
CONFIG_MBEDTLS_CHACHAPOLY_AEAD_ENABLED=y
CONFIG_MBEDTLS_POLY1305=y
CONFIG_MBEDTLS_ECP_C=y
CONFIG_MBEDTLS_ECDSA_C=y
CONFIG_MBEDTLS_ECDSA_DETERMINISTIC=y
CONFIG_MBEDTLS_ECP_DP_SECP256R1_ENABLED=y
CONFIG_MBEDTLS_ECP_DP_CURVE25519_ENABLED=y
CONFIG_MBEDTLS_SHA256=y
CONFIG_MBEDTLS_HKDF_C=y
CONFIG_MBEDTLS_HMAC_DRBG_ENABLED=y

# X.509 writer for self-signed CA cert at slot 0 bootstrap (and future
# SIGN_CSR output).  DER on the wire (no PEM).
#
# Knob map for the Zephyr MBEDTLS_BUILTIN path (config-tls-generic.h):
#   PK_WRITE_C       → brings PK_C, ASN1_WRITE_C
#   X509_CRT_PARSE_C → brings X509_USE_C → OID_C, ASN1_PARSE_C
#   X509_CSR_WRITE_C → brings X509_CREATE_C (CRT_WRITE_C does not by itself)
#   X509_CRT_WRITE_C → cert creation API
CONFIG_MBEDTLS_PK_WRITE_C=y
CONFIG_MBEDTLS_X509_CSR_WRITE_C=y
CONFIG_MBEDTLS_X509_CRT_WRITE_C=y
# Defines MBEDTLS_OID_C and MBEDTLS_X509_USE_C, which config-tls-generic.h
# gates behind TLS key exchange symbols this PKI-only build doesn't enable.
CONFIG_MBEDTLS_USER_CONFIG_ENABLE=y
CONFIG_MBEDTLS_USER_CONFIG_FILE="cantil_mbedtls_user_config.h"

# TRNG — Zephyr entropy device (CC310 hardware) used directly as the RNG
# callback for mbedtls.  No CTR_DRBG layer.
CONFIG_ENTROPY_GENERATOR=y

# LittleFS — FMP_DEV enables the flash-map-partition backend
CONFIG_FLASH_MAP=y
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LITTLEFS=y
CONFIG_FS_LITTLEFS_FMP_DEV=y
CONFIG_FILE_SYSTEM_MKFS=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# RTT log backend as fallback — emits over SWD even if USB is broken.
# Requires an SWD probe to read (J-Link / nRF DK as programmer);
# silently a no-op otherwise. Keep CONFIG_LOG_BACKEND_UART=y too
# (default from board) so logs are also available on ACM #1.
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_RTT=y

# Reboot (used by RESET_DEVICE secure wipe)
CONFIG_REBOOT=y

# Stack sizes.
# The protocol dispatcher runs on the main thread and keeps a ~4 KB response
# scratch on the stack; opcodes that build a cert/CSR live (x509write + ECDSA
# sign over P-256) need headroom on top of that. 8 KB overflowed during the
# T-05 GET_SESSION_CSR build on real hardware — 12 KB gives a safe margin for
# the CSR/cert-signing opcodes (RAM is abundant: ~76 KB / 256 KB used).
CONFIG_MAIN_STACK_SIZE=12288
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# USB device identity — Cantil-specific VID/PID so the host client can
# enumerate connected devices by ID instead of guessing /dev/ttyACM*.
# 0x1209:0x00CA is registered via pid.codes (https://pid.codes/1209/00CA/).
CONFIG_USB_DEVICE_VID=0x1209
CONFIG_USB_DEVICE_PID=0x00CA
CONFIG_USB_DEVICE_MANUFACTURER="Cantil"
CONFIG_USB_DEVICE_PRODUCT="Cantil Hardware CA"

CONFIG_PAIRING_TAP_CONFIRM=y
