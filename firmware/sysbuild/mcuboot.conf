# MCUboot child image configuration (NCS v3.0.2 sysbuild).
#
# Applied for CANTIL_BOOTLOADER_UF2_MCUBOOT and CANTIL_BOOTLOADER_MCUBOOT
# tiers (both set CONFIG_BOOTLOADER_MCUBOOT=y in their board .conf).
#
# Signing key: MCUboot must have the PUBLIC key baked in at build time so it
# can verify the image signature.  Pass it via SB_CONFIG_BOOT_SIGNATURE_KEY_FILE
# on the cmake command line (build.sh injects this from --signing-key):
#
#   ./scripts/dbox.sh bash scripts/build.sh \
#       --bootloader uf2_mcuboot \
#       --signing-key ~/.cantil/firmware-signing/fw_signing.key.pem
#
# The key file is the same EC P-256 PEM used by imgtool sign on the app side;
# MCUboot extracts the public portion automatically when building.

# ECDSA-P256 signature validation (matches imgtool sign / fw_signing.key.pem).
CONFIG_BOOT_SIGNATURE_TYPE_ECDSA_P256=y

# Swap algorithm: move-based swap uses RAM as scratch, no flash scratch
# partition needed.  Compatible with both internal-only (MCUBOOT) and
# internal+QSPI (UF2_MCUBOOT) layouts.
CONFIG_BOOT_SWAP_USING_MOVE=y

# Maximum number of flash sectors per slot.  940 KB / 4 KB = 235 sectors for
# the UF2_MCUBOOT tier; 486 KB / 4 KB = 122 sectors for MCUBOOT.
# 256 covers both tiers with headroom.
CONFIG_BOOT_MAX_IMG_SECTORS=256

# QSPI NOR flash driver (needed for UF2_MCUBOOT secondary slot on QSPI).
# Harmless for MCUBOOT (secondary slot is internal; driver is not used).
CONFIG_NORDIC_QSPI_NOR=y
CONFIG_NORDIC_QSPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# Disable serial recovery (no UF2 in MCUBOOT; UF2_MCUBOOT uses UF2
# for recovery instead of MCUboot's own serial DFU).
CONFIG_MCUBOOT_SERIAL=n

# The XIAO BLE board enables USB CDC-ACM as its default console, but MCUboot
# does not have the full Zephyr syscall infrastructure needed to link USB
# drivers.  Disable USB, CDC-ACM, and the UART console entirely.  MCUboot
# uses only the fault/panic handler outputs in production; no console needed.
CONFIG_USB_DEVICE_STACK=n
CONFIG_USB_CDC_ACM=n
CONFIG_UART_LINE_CTRL=n
CONFIG_UART_CONSOLE=n
