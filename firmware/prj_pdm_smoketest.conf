# PDM microphone smoke-test — replaces prj.conf entirely.
#
# This is a self-contained diagnostic build. Purpose: verify the onboard
# MEMS PDM microphone (msm261d3526hicpm-c) is functional on a given XIAO
# BLE Sense unit. None of the production CA stack (PSA crypto, LittleFS,
# Noise session, BLE) is built in.
#
# Use case: A/B compare two physical XIAO units side-by-side after the
# LSM6DS3TR-C IMU on one unit went silent on I2C (see project_tap_imu_debug).

CONFIG_CANTIL_PDM_SMOKETEST=y

# Audio capture: DMIC driver bound to the nRF PDM peripheral
CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y

# Mic power gate (msm261d3526hicpm-c-en regulator on P1.10) — DT compatible
# is "regulator-fixed", which needs both the subsystem and the fixed driver.
CONFIG_REGULATOR=y
CONFIG_REGULATOR_FIXED=y

# USB CDC ACM console: board overlay aliases zephyr,console to cdc_acm_uart0
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=y
CONFIG_USB_CDC_ACM=y
CONFIG_UART_LINE_CTRL=y
CONFIG_UART_CONSOLE=y

# Logging over CDC ACM
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_PRINTK=y

# GPIO for LED level meter
CONFIG_GPIO=y

# Stack sizes — DMIC blocks live on the heap/mem_slab but stats are computed
# on the main thread stack; modest reserve is plenty.
CONFIG_MAIN_STACK_SIZE=4096

# BLE explicitly off (avoid the bt_hci_core init path that overrides
# CONFIG_BT=n elsewhere — see project_tap_imu_debug side findings).
CONFIG_BT=n

# Hardware fault protection
CONFIG_ARM_MPU=y
CONFIG_HW_STACK_PROTECTION=y
