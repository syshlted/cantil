# ztest framework
CONFIG_ZTEST=y

# Inject the responder's Noise static + ephemeral keypairs (and the identity
# cert chain) so session.c runs without storage / session-slot dependencies.
CONFIG_CANTIL_TEST_INJECT_NOISE_KEYS=y

# Entropy for mbedtls RNG (noise_crypto_dh_keygen is called live here).
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y

# mbedtls primitives consumed by noise_crypto_mbedtls.c
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_BUILTIN=y
CONFIG_MBEDTLS_CIPHER_CHACHA20_ENABLED=y
CONFIG_MBEDTLS_CHACHAPOLY_AEAD_ENABLED=y
CONFIG_MBEDTLS_POLY1305=y
CONFIG_MBEDTLS_ECP_C=y
CONFIG_MBEDTLS_ECP_DP_CURVE25519_ENABLED=y
CONFIG_MBEDTLS_SHA256=y
CONFIG_MBEDTLS_HKDF_C=y
CONFIG_MBEDTLS_HMAC_DRBG_ENABLED=y

CONFIG_MAIN_STACK_SIZE=16384
CONFIG_HEAP_MEM_POOL_SIZE=16384
