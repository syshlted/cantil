# ztest framework
CONFIG_ZTEST=y

# Slot count must match the production default.
CONFIG_CANTIL_MAX_KEY_SLOTS=8

# Entropy — native_sim has zephyr,native-posix-rng.
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y

# Device-id source for the FICR-derived CN (falls back to "Cantil" if absent).
CONFIG_HWINFO=y

# mbedtls — CA path (ECDSA P-256, AES-256-GCM, HKDF-SHA256) + X.509 writer,
# plus the Noise primitives session_slot.c pulls via noise_crypto_mbedtls.c
# (X25519 keygen / ChaCha20-Poly1305 / SHA-256).
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_BUILTIN=y
CONFIG_MBEDTLS_CIPHER_AES_ENABLED=y
CONFIG_MBEDTLS_CIPHER_GCM_ENABLED=y
CONFIG_MBEDTLS_CIPHER_CHACHA20_ENABLED=y
CONFIG_MBEDTLS_CHACHAPOLY_AEAD_ENABLED=y
CONFIG_MBEDTLS_POLY1305=y
CONFIG_MBEDTLS_ECP_C=y
CONFIG_MBEDTLS_ECDSA_C=y
CONFIG_MBEDTLS_ECDSA_DETERMINISTIC=y
CONFIG_MBEDTLS_ECP_DP_SECP256R1_ENABLED=y
CONFIG_MBEDTLS_ECP_DP_CURVE25519_ENABLED=y
CONFIG_MBEDTLS_SHA256=y
CONFIG_MBEDTLS_HKDF_C=y
CONFIG_MBEDTLS_HMAC_DRBG_ENABLED=y

# X.509 writer + parser (needed to emit and re-parse cert.der).
CONFIG_MBEDTLS_PK_WRITE_C=y
CONFIG_MBEDTLS_X509_CSR_WRITE_C=y
CONFIG_MBEDTLS_X509_CRT_WRITE_C=y
CONFIG_MBEDTLS_USER_CONFIG_ENABLE=y
CONFIG_MBEDTLS_USER_CONFIG_FILE="cantil_mbedtls_user_config.h"

# LittleFS on the sim flash partition (storage_partition enlarged by overlay).
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LITTLEFS=y
CONFIG_FS_LITTLEFS_FMP_DEV=y
CONFIG_FILE_SYSTEM_MKFS=y

CONFIG_MAIN_STACK_SIZE=16384
CONFIG_HEAP_MEM_POOL_SIZE=32768
