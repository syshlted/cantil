# PDM smoke-test board overlay for xiao_ble/nrf52840/sense.
#
# Most board-specific config (USB descriptors, console UART alias) is in the
# board DTS; nothing further needed beyond the base prj_pdm_smoketest.conf.
# This file exists so FILE_SUFFIX=pdm_smoketest resolves cleanly to a
# replacement board conf rather than picking up xiao_ble_nrf52840_sense.conf
# (which expects the full CA stack to be built).
