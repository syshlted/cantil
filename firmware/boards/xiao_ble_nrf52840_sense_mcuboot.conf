# XIAO BLE Sense — MCUboot-only tier (maximum security, production).
# Build with:
#   ./scripts/dbox.sh bash scripts/build.sh \
#       --bootloader mcuboot \
#       --signing-key ~/.cantil/firmware-signing/fw_signing.key.pem
#
# Flash layout: dual internal slots (~486 KB each).  No UF2; no QSPI needed
# for firmware updates.  Recovery via SWD only.
#
# FILE_SUFFIX=mcuboot replaces (not extends) xiao_ble_nrf52840_sense.conf,
# so all hardware settings must be included here.

CONFIG_CANTIL_BOOTLOADER_MCUBOOT=y

# MCUboot integration (sysbuild builds mcuboot child image alongside the app).
CONFIG_BOOTLOADER_MCUBOOT=y

# In-app MCUboot management: boot_request_upgrade / boot_is_img_confirmed /
# boot_write_img_confirmed (used by fw_update module).
# STREAM_FLASH is a dependency of IMG_MANAGER; IMG_MANAGER contains the
# MCUBOOT_IMG_MANAGER choice, which selects MCUBOOT_BOOTUTIL_LIB.
CONFIG_STREAM_FLASH=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUBOOT_IMG_MANAGER=y

# No UF2 output — updates go through UPDATE_FIRMWARE opcode over Noise only.
CONFIG_BUILD_OUTPUT_UF2=n

# Strict session identity check required for production.
CONFIG_CANTIL_SESSION_X509_STRICT=y

# ── Hardware settings (from xiao_ble_nrf52840_sense.conf base) ──────────────
CONFIG_CANTIL_INPUT_IMU=n
CONFIG_CANTIL_INPUT_MIC=n
CONFIG_CANTIL_INPUT_BUTTON=y
CONFIG_GPIO=y

CONFIG_PWM=y
CONFIG_LED=y
CONFIG_LED_PWM=y
CONFIG_CANTIL_TRANSPORT_USB=y
CONFIG_CANTIL_STORAGE_EXTERNAL=y

CONFIG_USB_CDC_ACM=y
CONFIG_UART_LINE_CTRL=y

CONFIG_FLASH=y
CONFIG_NORDIC_QSPI_NOR=y
CONFIG_NORDIC_QSPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# NCS Partition Manager: LittleFS on full external QSPI (secondary slot is
# internal, so full 2 MB is available for key/cert storage).
CONFIG_PM_PARTITION_REGION_LITTLEFS_EXTERNAL=y
CONFIG_PM_PARTITION_SIZE_LITTLEFS=0x200000

CONFIG_I2C=y
CONFIG_SENSOR=n
CONFIG_LSM6DSL=n
