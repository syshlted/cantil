# nRF52840 DK — development and debug target
CONFIG_CANTIL_INPUT_BUTTON=y
CONFIG_CANTIL_TRANSPORT_USB=y
CONFIG_CANTIL_TRANSPORT_BLE=y
CONFIG_CANTIL_STORAGE_INTERNAL=y

# USB CDC/ACM
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_UART_LINE_CTRL=y

# BLE
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_NUS=y
CONFIG_BT_SMP=y
CONFIG_BT_PRIVACY=y
CONFIG_BT_BONDABLE=y
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=4

# Internal flash + NVS
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# GPIO for button tap input
CONFIG_GPIO=y

# MCUboot
CONFIG_BOOTLOADER_MCUBOOT=y
