# Diagnostic: all base board config, BT/MPSL disabled.
# FILE_SUFFIX replaces the base board conf so this must be self-contained.
# If USB enumerates with this build → MPSL/BT init was crashing the full build.

CONFIG_CANTIL_INPUT_IMU=y
CONFIG_CANTIL_TRANSPORT_USB=y
CONFIG_CANTIL_TRANSPORT_BLE=n
# Storage disabled — LittleFS mount could crash during USB enumeration window
CONFIG_CANTIL_STORAGE_EXTERNAL=n

# USB (old stack). Let USB_DEVICE_INITIALIZE_AT_BOOT handle enumeration at
# APPLICATION SYS_INIT time. Our transport_usb_init() calls usb_enable()
# too (handles -EALREADY), but the SYS_INIT path is what actually asserts D+.
CONFIG_USB_CDC_ACM=y
CONFIG_UART_LINE_CTRL=y

# BLE disabled — this removes MPSL which init at PRE_KERNEL_1 before USB
CONFIG_BT=n

# External QSPI flash
CONFIG_FLASH=y
CONFIG_NORDIC_QSPI_NOR=y
CONFIG_NORDIC_QSPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# NCS PM: LittleFS on external flash (full 2 MB)
CONFIG_PM_PARTITION_REGION_LITTLEFS_EXTERNAL=y
CONFIG_PM_PARTITION_SIZE_LITTLEFS=0x200000

# IMU — LSM6DS3TR-C on I2C.
#
# Diagnostic-only: re-enable the upstream Zephyr LSM6DSL sensor driver
# alongside our direct-I2C tap_imu.c. We want to read its init verdict
# (device_is_ready) to find out whether the upstream driver can talk to
# the chip at all. In production this driver stays disabled per the
# comment in tap_imu.c (it only supports DATA_READY triggers).
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_LSM6DSL=y
CONFIG_LSM6DSL_TRIGGER_NONE=y
CONFIG_SENSOR_LOG_LEVEL_DBG=y

# UART console over CDC ACM. The board overlay aliases zephyr,console to
# cdc_acm_uart0; USB_DEVICE_INITIALIZE_AT_BOOT brings the link up before
# main() so by the time gesture_init() runs, /dev/ttyACM0 is live on the host.
CONFIG_UART_CONSOLE=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_PRINTK=y

# POST_KERNEL diagnostic blinks: pinpoints which init stage crashes
CONFIG_CANTIL_DIAG_BOOT=y

CONFIG_ARM_MPU=y
CONFIG_HW_STACK_PROTECTION=y
