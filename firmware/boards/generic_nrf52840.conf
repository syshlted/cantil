# Generic nRF52840 — minimal reference configuration
# USB + GPIO button + single LED, no external flash.
# Fork this config and the matching overlay for any nRF52840 board
# that lacks an IMU or QSPI flash.
CONFIG_CANTIL_INPUT_BUTTON=y
CONFIG_CANTIL_TRANSPORT_USB=y
CONFIG_CANTIL_TRANSPORT_BLE=y
CONFIG_CANTIL_STORAGE_INTERNAL=y

CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_UART_LINE_CTRL=y

CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_NUS=y
CONFIG_BT_SMP=y
CONFIG_BT_PRIVACY=y
CONFIG_BT_BONDABLE=y
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=4

CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

CONFIG_GPIO=y

CONFIG_BOOTLOADER_MCUBOOT=y
