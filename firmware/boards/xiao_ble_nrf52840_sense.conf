# Seeed Studio XIAO BLE Sense (xiao_ble/nrf52840/sense)
# Flash via the factory UF2 bootloader: double-tap reset → copy zephyr.uf2 to XIAO-SENSE.
# CONFIG_BUILD_OUTPUT_UF2 and CONFIG_REGULATOR are already on in the board defconfig.
# For MCUboot-signed production images use FILE_SUFFIX=release.

# Tap input source:
#   - LSM6DS3TR-C IMU: dead on both physical units (see project memory) — off.
#   - PDM mic: hardware works in the smoke-test build but production capture
#     wedges into constant DC; investigation deferred (see conversation_018).
#   - GPIO button: external push-button wired between XIAO D0 (P0.02) and GND;
#     selected here so the gesture state machine can be exercised end-to-end.
CONFIG_CANTIL_INPUT_IMU=n
CONFIG_CANTIL_INPUT_MIC=n
CONFIG_CANTIL_INPUT_BUTTON=y
CONFIG_GPIO=y

# RGB LED — driven via pwm-leds (overlay rebinds pwm0 to GPIOs 0:26/30/6).
# Enables HSV rendering for orange↔red crossfade, rainbow sweep, and per-tap
# dim-white feedback. See firmware/src/led/led.c.
CONFIG_PWM=y
CONFIG_LED=y
CONFIG_LED_PWM=y
CONFIG_CANTIL_TRANSPORT_USB=y
CONFIG_CANTIL_STORAGE_EXTERNAL=y

# Old USB device stack. USB_DEVICE_INITIALIZE_AT_BOOT (set by board dtsi)
# handles enumeration at APPLICATION SYS_INIT time.
CONFIG_USB_CDC_ACM=y
CONFIG_UART_LINE_CTRL=y

# BLE is intentionally not enabled in the default (FREE crypto backend) build.
# Zephyr's BT stack pulls in CONFIG_BT_HOST_CRYPTO, which auto-implies
# NRF_SECURITY, which in turn requires a PSA crypto driver (Oberon or CC3XX)
# to back AES/SHA — both are closed-source under the Nordic 5-Clause license
# and would taint the GPLv3 default build.  When the ACCELERATED crypto
# backend is implemented (LICENSE-EXCEPTIONS.md proprietary-crypto opt-in),
# add the BLE switches back via a separate _ble.conf overlay loaded with
# FILE_SUFFIX=ble or EXTRA_CONF_FILE.  Source-tree transport_ble.c stays
# in place; only the build-time toggle is deferred.

# External QSPI flash — hardware configured by board DTS; enable drivers explicitly
CONFIG_FLASH=y
CONFIG_NORDIC_QSPI_NOR=y
CONFIG_NORDIC_QSPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# NCS Partition Manager: put the LittleFS partition on external QSPI flash (full 2 MB)
CONFIG_PM_PARTITION_REGION_LITTLEFS_EXTERNAL=y
CONFIG_PM_PARTITION_SIZE_LITTLEFS=0x200000

# IMU — LSM6DS3TR-C on I2C (board DTS: lsm6ds3tr_c @ i2c0 0x6a, irq gpio0 11).
# tap_imu.c programs the chip directly via I2C; the Zephyr LSM6DSL driver
# must NOT be enabled — both writers would fight over the chip's config
# registers and leave the bus in an unknown state.
CONFIG_I2C=y
CONFIG_SENSOR=n
CONFIG_LSM6DSL=n
