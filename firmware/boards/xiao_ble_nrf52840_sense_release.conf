# Release overlay: adds MCUboot signing, removes UF2 output.
# Build with: west build -b xiao_ble/nrf52840 -- -DFILE_SUFFIX=release
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_BUILD_OUTPUT_UF2=n

# Reject (enter recovery mode) if the stored session identity cert no longer
# matches the build-time constant (transport + pairing T-03).
CONFIG_CANTIL_SESSION_X509_STRICT=y
