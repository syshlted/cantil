# Gesture / LED rehearsal build — identical to the base config plus the
# rehearsal flag. FILE_SUFFIX replaces the base conf so this must be a full
# copy (with the one extra line).
#
# Build:   ./scripts/dbox.sh bash scripts/build.sh -- -DFILE_SUFFIX=rehearsal
# Flash:   ./scripts/dbox.sh bash scripts/build.sh --flash -- -DFILE_SUFFIX=rehearsal
#
# How to drive it (everything happens on-device; no host needed):
#   LOCKED         tap unlock seq      ST DT ST DT       → UNLOCKED (green twin pulse)
#   UNLOCKED       pair trigger        DT DT ST ST       → PAIRING (magenta fast)
#   UNLOCKED       change-seq trigger  DT ST DT ST       → READY (yellow long pulse)
#                  then new seq                          → VERIFY (yellow two pulses)
#                  then re-enter seq                     → UNLOCKED or FAIL
#   UNLOCKED       simulate PROTECT    DT DT DT DT       → CONFIRM_PROMPT (yellow steady)
#                  then DT DT DT                         → CONFIRMED (green long) or FAIL
#   UNLOCKED       simulate RESET      ST ST ST ST       → RESET_PROMPT (red urgent)
#                  then current unlock seq               → CONFIRMED (green long) or FAIL
#   any state      wrong sequence                        → FAIL (red fast burst)

CONFIG_CANTIL_INPUT_IMU=y
CONFIG_CANTIL_TRANSPORT_USB=y
CONFIG_CANTIL_TRANSPORT_BLE=y
CONFIG_CANTIL_STORAGE_EXTERNAL=y

# >>> Rehearsal-only addition <<<
CONFIG_CANTIL_GESTURE_REHEARSAL=y

# Old USB device stack. USB_DEVICE_INITIALIZE_AT_BOOT (set by board dtsi)
# handles enumeration at APPLICATION SYS_INIT time.
CONFIG_USB_CDC_ACM=y
CONFIG_UART_LINE_CTRL=y

# BLE
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_NUS=y
CONFIG_BT_SMP=y
CONFIG_BT_PRIVACY=y
CONFIG_BT_BONDABLE=y
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=4

# External QSPI flash — hardware configured by board DTS; enable drivers explicitly
CONFIG_FLASH=y
CONFIG_NORDIC_QSPI_NOR=y
CONFIG_NORDIC_QSPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# NCS Partition Manager: put the LittleFS partition on external QSPI flash (full 2 MB)
CONFIG_PM_PARTITION_REGION_LITTLEFS_EXTERNAL=y
CONFIG_PM_PARTITION_SIZE_LITTLEFS=0x200000

# IMU — LSM6DS3TR-C on I2C. tap_imu.c programs the chip directly via I2C
# (bypassing the Zephyr LSM6DSL driver, which only supports DATA_READY
# triggers). We need the I2C bus and the GPIO interrupt line; everything
# else the chip needs is set up by tap_imu_init().
CONFIG_I2C=y
# Zephyr LSM6DSL sensor driver explicitly NOT enabled to avoid two writers
# fighting for the chip's config registers.

# Regulator framework left ON so the lsm6ds3tr-c-en regulator-boot-on node
# actually enables the IMU. We earlier tried driving P1.08 ourselves and the
# chip stayed silent on I2C, suggesting our raw GPIO toggle wasn't bringing
# the load switch up.
CONFIG_REGULATOR=y
CONFIG_REGULATOR_FIXED=y
