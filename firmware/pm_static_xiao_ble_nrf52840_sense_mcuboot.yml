# Partition Manager static layout — XIAO BLE Sense, MCUboot-only tier.
#
# Boot chain:
#   MBR → MCUboot (validates + swaps) → App (primary slot)
#
# Update flow:
#   authenticated UPDATE_FIRMWARE opcode over Noise session writes the
#   signed image to the secondary slot → reboot → MCUboot verifies and swaps.
#
# The UF2 bootloader is physically present at 0xF4000 (factory-burned) but
# not mapped here — it is intentionally overwritten by the secondary slot.
# Recovery from a bad flash requires SWD (test-point pads on XIAO underside).
# This tier is the maximum-security configuration; combine with APPROTECT
# to resist device-in-hand attackers.
#
# No QSPI dependency for firmware updates; LittleFS retains the full 2 MB.
#
# Internal flash (1 MB = 0x100000):
#   mbr:               0x000000   4 KB   Nordic MBR
#   mcuboot:           0x001000  48 KB   MCUboot image
#   mcuboot_primary:   0x00D000 486 KB   primary app slot (mcuboot_pad + app)
#     mcuboot_pad:     0x00D000   0.5 KB MCUboot image header padding
#     app:             0x00D200 485.5 KB firmware application
#   mcuboot_secondary: 0x086800 486 KB   secondary app slot
#   (0xD000 + 2 × 0x79800 = 0x100000 — uses full internal flash)
#
# QSPI flash (2 MB = 0x200000):
#   littlefs_storage:  0x000000   2 MB   key/cert storage (full QSPI)

mbr:
  address: 0x0
  size: 0x1000
  region: flash_primary

mcuboot:
  address: 0x1000
  size: 0xC000
  region: flash_primary

mcuboot_pad:
  address: 0xD000
  size: 0x200

app:
  address: 0xD200
  size: 0x79600

mcuboot_primary:
  orig_span: &id001
  - mcuboot_pad
  - app
  span: *id001
  address: 0xD000
  size: 0x79800
  region: flash_primary

mcuboot_primary_app:
  orig_span: &id002
  - app
  span: *id002
  address: 0xD200
  size: 0x79600

mcuboot_secondary:
  address: 0x86800
  size: 0x79800
  region: flash_primary
