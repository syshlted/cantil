# Accelerated crypto backend overlay (Oberon + CC3XX via nrf_security / PSA).
#
# Apply with:
#   west build -b xiao_ble/nrf52840/sense -- -DEXTRA_CONF_FILE=prj_accelerated.conf
#
# This overlay layers on top of prj.conf (and the board overlay) to flip
# CANTIL_CRYPTO_BACKEND from FREE to ACCELERATED and to declare the PSA
# primitives the firmware actually uses. The mbedtls_* C-API call sites in
# firmware/src/ca/ca.c and firmware/src/noise/noise_crypto_mbedtls.c keep
# their signatures; MBEDTLS_USE_PSA_CRYPTO routes them internally through
# PSA, which then dispatches to CC3XX (hardware) or Oberon (software).
#
# Licensing: selecting this backend pulls in the Nordic-licensed Oberon
# ocrypto binary archive (ARM-only) and the closed-source CC3XX driver,
# both covered by the proprietary-crypto opt-in in LICENSE-EXCEPTIONS.md.
#
# Native_sim ztest is NOT viable on this backend (Oberon ships only
# Cortex-M0/M4/M33 binary archives). Correctness is gated by the FREE
# backend's ztest sweep; this backend's gate is a clean build + on-device
# runtime smoke (USB enumeration, sign latency, Noise negotiation, CRL
# parse-and-verify under openssl crl -verify).

# Backend selection
CONFIG_CANTIL_CRYPTO_BACKEND_FREE=n
CONFIG_CANTIL_CRYPTO_BACKEND_ACCELERATED=y

# --- PSA primitives required by the firmware ---
#
# CA operations (firmware/src/ca/ca.c):
#   - ECDSA P-256 sign/verify, deterministic (RFC 6979)
#   - AES-256-GCM for encrypted key blobs on LittleFS
#   - HKDF-SHA-256 for FICR-derived storage key
#   - SHA-256
# PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_BASIC is implied by GENERATE/IMPORT/EXPORT.
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_GENERATE=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_IMPORT=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_EXPORT=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_PUBLIC_KEY=y
CONFIG_PSA_WANT_ALG_ECDSA=y
CONFIG_PSA_WANT_ALG_DETERMINISTIC_ECDSA=y
CONFIG_PSA_WANT_ECC_SECP_R1_256=y

CONFIG_PSA_WANT_KEY_TYPE_AES=y
CONFIG_PSA_WANT_AES_KEY_SIZE_256=y
CONFIG_PSA_WANT_ALG_GCM=y

CONFIG_PSA_WANT_ALG_SHA_256=y
CONFIG_PSA_WANT_ALG_HKDF=y
CONFIG_PSA_WANT_ALG_HMAC=y

CONFIG_PSA_WANT_GENERATE_RANDOM=y

# Noise_XX session (firmware/src/noise/noise_crypto_mbedtls.c):
#   - X25519 ECDH (Curve25519 / Montgomery 255)
#   - ChaCha20-Poly1305 AEAD
#   - SHA-256 (covered above)
CONFIG_PSA_WANT_ALG_ECDH=y
CONFIG_PSA_WANT_ECC_MONTGOMERY_255=y

CONFIG_PSA_WANT_KEY_TYPE_CHACHA20=y
CONFIG_PSA_WANT_ALG_CHACHA20_POLY1305=y

# Route Montgomery 255 / X25519 to Oberon software, not CC3XX. CC310 silicon
# does not implement Curve25519; with CC3XX's key-agreement driver enabled,
# NCS selects PSA_ACCEL_ECDH_MONTGOMERY_255 which then excludes Oberon
# (nrf/.../nrf_oberon/Kconfig:140). The runtime fails -141 NOT_SUPPORTED on
# both psa_generate_key and psa_import_key for ECC_KEY_PAIR(MONTGOMERY).
# Disabling the CC3XX key-agreement driver lets Oberon claim X25519. P-256
# ECDH is not used by this firmware (CA signs with ECDSA, Noise uses X25519),
# so this disable affects no live code path. ECDSA/AES-GCM/SHA/HKDF/TRNG
# CC3XX paths are not touched.
CONFIG_PSA_USE_CC3XX_KEY_AGREEMENT_DRIVER=n

# --- Legacy mbedtls API surface (ca.c) ---
#
# ca.c uses high-level mbedtls PK + X.509 + ECP + MPI APIs to plumb a
# P-256 private key into the X.509 writer (set_issuer_key, set_subject_key)
# and to derive pubkey points. These are API-surface knobs; with
# MBEDTLS_USE_PSA_CRYPTO=y the underlying primitives still dispatch to
# PSA / Oberon / CC3XX.
#
# The AEAD / hash / stream-cipher knobs are deliberately NOT re-enabled
# here. Modules 1 + 2 of the PSA port removed every source-level use of
# mbedtls_gcm_* / mbedtls_chachapoly_* / mbedtls_aes_* / mbedtls_chacha20_*,
# so the legacy primitive accelerators (CC310 legacy archive + Oberon
# liboberon_mbedtls) no longer need to be linked — which is what was
# producing the *_alt.c.obj symbol collision pre-module-1.
CONFIG_MBEDTLS_PK_C=y
CONFIG_MBEDTLS_PK_WRITE_C=y
CONFIG_MBEDTLS_PK_PARSE_C=y
CONFIG_MBEDTLS_ECP_C=y
CONFIG_MBEDTLS_ECDSA_C=y
CONFIG_MBEDTLS_ECDH_C=y
CONFIG_MBEDTLS_SHA256_C=y
CONFIG_MBEDTLS_MD_C=y
CONFIG_MBEDTLS_HKDF_C=y
CONFIG_MBEDTLS_HMAC_DRBG_C=y
CONFIG_MBEDTLS_ECP_DP_SECP256R1_ENABLED=y
CONFIG_MBEDTLS_ECP_DP_CURVE25519_ENABLED=y

# X.509 — both parse and write paths are used (CSR parse for SIGN_CSR,
# CRT write for cert issuance, CSR write for GEN_KEY_CSR, CRT parse for
# GET_CA_SERIAL / PUSH_KEY_CERT pubkey extraction).
CONFIG_MBEDTLS_X509_LIBRARY=y
CONFIG_MBEDTLS_X509_USE_C=y
CONFIG_MBEDTLS_X509_CREATE_C=y
CONFIG_MBEDTLS_X509_CRT_PARSE_C=y
CONFIG_MBEDTLS_X509_CRT_WRITE_C=y
CONFIG_MBEDTLS_X509_CSR_PARSE_C=y
CONFIG_MBEDTLS_X509_CSR_WRITE_C=y
